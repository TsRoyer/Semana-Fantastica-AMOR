<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tu Regalo Mágico</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS BASE */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* Vital para que no haga scroll en el móvil */
            font-family: 'Playfair Display', serif;
            /* Evita el refresco al tirar hacia abajo en Safari */
            overscroll-behavior-y: none; 
        }

        /* EL CONTENEDOR DE LA IMAGEN DE FONDO */
        .contenedor-imagen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* AQUÍ PONES LA FOTO DEL REGALO O LA IMAGEN QUE QUIERAS MOSTRAR */
            background-image: url('./imagenes/ultimoregalo.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* EL EFECTO LINTERNA (TRUCO DE LA SOMBRA GIGANTE) */
        .linterna {
            position: absolute;
            top: 0;
            left: 0;
            /* Tamaño del círculo de luz */
            width: 220px; 
            height: 220px;
            border-radius: 50%;
            /* La sombra gigante que tapa todo menos el centro */
            box-shadow: 0 0 0 9999px #050505, inset 0 0 25px 10px #050505;
            pointer-events: none; /* Para que el dedo atraviese este div */
            z-index: 2;
            /* Posicionamiento inicial fuera de pantalla */
            transform: translate3d(-500px, -500px, 0); 
            will-change: transform; /* Le dice a Safari que use la GPU */
        }

        /* MENSAJITO INICIAL (Desaparece al tocar) */
        .instrucciones {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.5em;
            text-align: center;
            z-index: 3;
            pointer-events: none;
            transition: opacity 0.5s ease;
            width: 80%;
            text-shadow: 0 2px 10px #000;
        }

        .icono-dedo {
            font-size: 2em;
            display: block;
            margin-bottom: 15px;
            animation: deslizar 2s infinite ease-in-out;
        }

        @keyframes deslizar {
            0% { transform: translateX(-20px) rotate(-10deg); }
            50% { transform: translateX(20px) rotate(10deg); }
            100% { transform: translateX(-20px) rotate(-10deg); }
        }

        /* BOTÓN PARA VOLVER */
        .btn-volver {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(229, 9, 20, 0.8);
            color: white;
            border: 1px solid #E50914;
            padding: 12px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
            text-decoration: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        
        .btn-volver:active {
            transform: translateX(-50%) scale(0.95);
        }

    </style>
</head>
<body>

    <!-- Capa de la imagen de fondo -->
    <div class="contenedor-imagen" id="pantalla-tactil"></div>

    <!-- El círculo que hace de luz -->
    <div class="linterna" id="luz"></div>

    <!-- Instrucciones iniciales -->
    <div class="instrucciones" id="texto-guia">
        <span class="icono-dedo">👆</span>
        Desliza el dedo para buscar tu regalo en la oscuridad
    </div>

    <!-- Botón de vuelta -->
    <a href="index.html" class="btn-volver">Volver al inicio</a>

    <script>
        const luz = document.getElementById('luz');
        const pantallaTactil = document.getElementById('pantalla-tactil');
        const textoGuia = document.getElementById('texto-guia');

        // Variables para requestAnimationFrame (máxima fluidez)
        let framePendiente = false;
        let posX = -500;
        let posY = -500;

        // Función que actualiza la posición del círculo de luz con la GPU
        function renderizarLuz() {
            // Restamos la mitad del ancho del círculo (110px) para que quede centrado en el dedo
            luz.style.transform = `translate3d(${posX - 110}px, ${posY - 110}px, 0)`;
            framePendiente = false;
        }

        function rastrearMovimiento(e) {
            // Prevenir scroll nativo de Safari (vital para el móvil)
            e.preventDefault(); 

            // Ocultar las instrucciones al primer toque
            if (textoGuia.style.opacity !== '0') {
                textoGuia.style.opacity = '0';
            }

            // Detectar si es táctil (dedo) o ratón
            if (e.touches && e.touches.length > 0) {
                posX = e.touches[0].clientX;
                posY = e.touches[0].clientY;
            } else {
                posX = e.clientX;
                posY = e.clientY;
            }

            // Solo llamamos al render si no hay otro pendiente (evita lagazos en iOS)
            if (!framePendiente) {
                framePendiente = true;
                requestAnimationFrame(renderizarLuz);
            }
        }

        // --- LISTENERS TÁCTILES Y DE RATÓN ---
        // touchmove: cuando arrastra el dedo (El {passive: false} es obligatorio en iOS para poder usar preventDefault)
        pantallaTactil.addEventListener('touchmove', rastrearMovimiento, { passive: false });
        pantallaTactil.addEventListener('touchstart', rastrearMovimiento, { passive: false });
        
        // mousemove: por si lo abre en ordenador mientras hacemos pruebas
        pantallaTactil.addEventListener('mousemove', rastrearMovimiento);

    </script>
</body>
</html>
