<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miércoles - El Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: #E50914;
            font-family: 'Playfair Display', serif;
            font-size: 2.2em;
            margin-bottom: 5px;
            margin-top: 0;
        }

        #nivel-texto {
            color: #f39c12;
            font-size: 1.1em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 15px;
        }

        p {
            color: #ccc;
            font-size: 1em;
            line-height: 1.4;
            margin-bottom: 5px;
        }

        .texto-pista {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 25px;
            font-style: italic;
        }

        /* Contenedor de las 4 cajitas */
        .cajas-input {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        /* Estilo de cada cajita adaptado a móviles */
        .caja-num {
            background: #222;
            border: 2px solid #333;
            color: #fff;
            width: clamp(45px, 15vw, 60px);
            height: clamp(55px, 18vw, 70px);
            font-size: clamp(1.5em, 6vw, 2em);
            text-align: center;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
            font-weight: bold;
            -moz-appearance: textfield;
        }

        .caja-num::-webkit-outer-spin-button,
        .caja-num::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .caja-num:focus {
            border-color: #E50914;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
            transform: translateY(-2px);
        }

        button {
            background: #E50914;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            max-width: 285px;
        }

        button:hover {
            background: #f40612;
        }

        .historial {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
            padding-bottom: 40px;
        }

        .intento {
            display: flex;
            justify-content: center;
            gap: 10px;
            animation: deslizar 0.3s ease-out;
        }

        @keyframes deslizar {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Historial también responsivo */
        .digito-historial {
            width: clamp(45px, 15vw, 60px);
            height: clamp(45px, 15vw, 60px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-size: clamp(1.4em, 5vw, 1.8em);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Colores de aciertos */
        .correcto { background: #27ae60; color: white; border: 2px solid #27ae60; } /* Verde */
        .doble { background: #2980b9; color: white; border: 2px solid #2980b9; } /* Azul - Correcto y repetido */
        .regular { background: #f39c12; color: white; border: 2px solid #f39c12; } /* Naranja */
        .incorrecto { background: #333; color: #888; border: 2px solid #222; } /* Gris */

        .btn-volver {
            display: inline-block;
            background: #333;
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* ESTILOS DE LOS POPUPS (INTERMEDIO Y FINAL) */
        #popup-victoria, #popup-intermedio {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .contenido-popup {
            background: #222;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 80%;
            border: 2px solid #E50914;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
            animation: zoom 0.3s ease-out;
        }

        @keyframes zoom {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- POPUP INTERMEDIO -->
    <div id="popup-intermedio">
        <div class="contenido-popup" style="padding: 25px;">
            <h2 id="titulo-intermedio" style="color: #27ae60; margin-top: 0; font-size: 1.8em;">¡Código Descifrado!</h2>
            <p style="font-size: 1.1em; color: #ccc; margin-bottom: 0;">Cargando el siguiente nivel...</p>
        </div>
    </div>

    <!-- POPUP FINAL -->
    <div id="popup-victoria">
        <div class="contenido-popup">
            <h2 style="color: #E50914; margin-top: 0; font-size: 2em;">¡Sistemas Hackeados! 🔓</h2>
            <p style="font-size: 1.2em; color: #fff;">A la siguiente prueba en <br><br><span id="contador-redirect" style="font-size: 2em; font-weight: bold; color: #f39c12;">3</span>...</p>
        </div>
    </div>

    <div class="contenedor">
        <h1>El Código</h1>
        <h2 id="nivel-texto">Código 1 de 3</h2>
        <p style="font-size: 0.9em; text-align: left; display: inline-block;">
            🟩 = Número y posición.<br> 
            🟦 = Número y posición (¡Y se repite!)<br>
            🟧 = Número en otro sitio.<br> 
            ⬛ = Ese número no está.
        </p>

        <div class="cajas-input" id="contenedor-inputs">
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="caja-num" id="caja1" autofocus>
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="caja-num" id="caja2">
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="caja-num" id="caja3">
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="caja-num" id="caja4">
        </div>
        
        <button id="btn-probar" onclick="comprobarNumero()">Probar Código</button>

        <div class="historial" id="historial-intentos">
            <!-- Aquí van apareciendo las jugadas -->
        </div>

        <a href="https://wa.me/34644325070?text=NECESITO%20AYUDA%20EN%20EL%20MIERCOLES" target="_blank" class="btn-volver" style="background: #25D366; color: #fff; border: none;">Pedir Ayuda 💬</a>
    </div>

    <script>
        // LAS FECHAS SECRETAS QUE HAS ELEGIDO
        const codigosSecretos = ["2019", "1707", "1718"];
        let secreto = "";
        let nivelActual = 1;
        const maxNiveles = 3;

        function cargarNivel() {
            secreto = codigosSecretos[nivelActual - 1];
        }

        cargarNivel();

        // Lógica para que el foco salte en móvil y PC
        const inputs = document.querySelectorAll('.caja-num');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                input.value = input.value.replace(/[^0-9]/g, '');
                if(input.value !== '' && index < 3) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if(e.key === 'Backspace' && input.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
                if(e.key === 'Enter') {
                    comprobarNumero();
                }
            });
        });

        function comprobarNumero() {
            let intento = "";
            inputs.forEach(input => intento += input.value);

            let historial = document.getElementById("historial-intentos");
            let botonProbar = document.getElementById("btn-probar");
            let nivelTexto = document.getElementById("nivel-texto");

            if (intento.length !== 4) {
                return;
            }

            let fila = document.createElement("div");
            fila.className = "intento";

            let aciertosTotales = 0;
            
            let intentoArr = intento.split('');
            let secretoArr = secreto.split('');
            let clasesResultado = Array(4).fill("incorrecto");

            // Contar cuántas veces aparece cada número en el código secreto
            let conteoSecreto = {};
            for (let char of secreto) {
                conteoSecreto[char] = (conteoSecreto[char] || 0) + 1;
            }

            // Pasada 1: Buscar los que están clavados en su sitio (Verdes o Azules)
            for (let i = 0; i < 4; i++) {
                if (intentoArr[i] === secretoArr[i]) {
                    // Si el número aparece más de una vez en el secreto original, lo pintamos azul
                    if (conteoSecreto[intentoArr[i]] > 1) {
                        clasesResultado[i] = "doble";
                    } else {
                        clasesResultado[i] = "correcto";
                    }
                    
                    secretoArr[i] = null; // Lo tachamos para que no cuente doble en los naranjas
                    intentoArr[i] = null;
                    aciertosTotales++;
                }
            }

            // Pasada 2: Buscar los que están pero en otro lado (Naranjas)
            for (let i = 0; i < 4; i++) {
                if (intentoArr[i] !== null) {
                    let index = secretoArr.indexOf(intentoArr[i]);
                    if (index !== -1) {
                        clasesResultado[i] = "regular";
                        secretoArr[index] = null; // Lo tachamos
                    }
                }
            }

            // Dibujar las cajitas en el historial con su color
            for (let i = 0; i < 4; i++) {
                let digitoBox = document.createElement("div");
                digitoBox.className = "digito-historial " + clasesResultado[i];
                digitoBox.innerText = intento[i];
                fila.appendChild(digitoBox);
            }

            historial.prepend(fila);
            
            inputs.forEach(input => input.value = "");
            inputs[0].focus();

            // MÁQUINA DE ESTADOS AL ACERTAR
            if (aciertosTotales === 4) {
                if (nivelActual < maxNiveles) {
                    nivelActual++;
                    
                    let popupInt = document.getElementById("popup-intermedio");
                    document.getElementById("titulo-intermedio").innerText = "¡Código " + (nivelActual - 1) + " Descifrado!";
                    popupInt.style.display = "flex";

                    setTimeout(() => {
                        popupInt.style.display = "none";
                        nivelTexto.innerText = "Código " + nivelActual + " de 3";
                        historial.innerHTML = ""; 
                        cargarNivel(); 
                    }, 1500);

                } else {
                    inputs.forEach(input => input.disabled = true);
                    botonProbar.disabled = true;
                    nivelTexto.innerText = "¡SISTEMAS HACKEADOS!";
                    nivelTexto.style.color = "#27ae60";
                    
                    let popupVic = document.getElementById("popup-victoria");
                    popupVic.style.display = "flex";

                    let tiempo = 3;
                    let contadorDOM = document.getElementById("contador-redirect");
                    
                    let intervalo = setInterval(() => {
                        tiempo--;
                        contadorDOM.innerText = tiempo;
                        if (tiempo <= 0) {
                            clearInterval(intervalo);
                            window.location.href = "ahorcado.html";
                        }
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
